<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>Tenor Install</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #fafafa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #222;
        }
        .card {
            background: #fff;
            width: 100%;
            max-width: 400px;
            border-radius: 24px;
            box-shadow: 0 6px 24px rgba(0,0,0,0.04), 0 2px 8px rgba(0,0,0,0.02);
            padding: 36px 28px;
            border: 1px solid #f0f0f0;
        }
        @media (max-width: 420px) {
            .card { padding: 28px 18px; }
        }
        .title {
            font-size: 28px;
            font-weight: 450;
            letter-spacing: 0.5px;
            color: #1a1a1a;
            padding-bottom: 18px;
            margin-bottom: 24px;
            border-bottom: 1px solid #eee;
        }
        .field {
            margin-bottom: 22px;
        }
        .field label {
            display: block;
            font-size: 15px;
            font-weight: 440;
            color: #222;
            margin-bottom: 6px;
            letter-spacing: 0.2px;
        }
        .field input {
            width: 100%;
            padding: 14px 16px;
            background: #f8f8f8;
            border: 1px solid #e8e8e8;
            border-radius: 16px;
            font-size: 16px;
            color: #1a1a1a;
            outline: none;
            transition: border 0.15s, background 0.15s;
        }
        .field input:focus {
            border-color: #555;
            background: #fff;
            box-shadow: 0 0 0 2px rgba(0,0,0,0.02);
        }
        .btn {
            width: 100%;
            padding: 15px;
            background: #1a1a1a;
            color: #fff;
            border: none;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 450;
            cursor: pointer;
            transition: background 0.15s;
            margin-top: 6px;
        }
        .btn:hover { background: #2a2a2a; }
        .btn:active { transform: scale(0.98); }
        .msg {
            display: none;
            margin-top: 12px;
            padding: 10px 14px;
            background: #f4f4f4;
            border-radius: 30px;
            font-size: 14px;
            color: #444;
            text-align: center;
        }
        /* 弹窗 */
        .toast-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.25);
            align-items: center;
            justify-content: center;
            z-index: 999;
            backdrop-filter: blur(2px);
        }
        .toast-box {
            background: #fff;
            border-radius: 28px;
            padding: 32px 40px 28px;
            max-width: 340px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.12);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .toast-box .toast-icon {
            font-size: 44px;
            line-height: 1;
            margin-bottom: 8px;
            color: #1a1a1a;
        }
        .toast-box .toast-title {
            font-size: 20px;
            font-weight: 450;
            color: #1a1a1a;
            margin-bottom: 6px;
        }
        .toast-box .toast-desc {
            font-size: 15px;
            color: #555;
            margin-bottom: 20px;
            word-break: break-all;
        }
        .toast-box .toast-btn {
            background: #1a1a1a;
            color: #fff;
            border: none;
            padding: 12px 32px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 450;
            cursor: pointer;
            transition: background 0.15s;
        }
        .toast-box .toast-btn:hover { background: #2a2a2a; }
        .toast-box .toast-btn:active { transform: scale(0.96); }
    </style>
</head>
<body>
<div class="card">
    <div class="title">Tenor - 安装指引</div>
    <form method="POST" action="" id="installForm">
        <div class="field">
            <label>账号</label>
            <input type="text" name="admin" placeholder="" required>
        </div>
        <div class="field">
            <label>密码</label>
            <input type="password" name="password" placeholder="" required>
        </div>
        <button type="submit" class="btn" id="installBtn">安装</button>
        <div id="msg" class="msg"></div>
    </form>
</div>

<!-- 弹窗 -->
<div class="toast-overlay" id="toastOverlay">
    <div class="toast-box">
        <div class="toast-icon">✓</div>
        <div class="toast-title" id="toastTitle">安装成功</div>
        <button class="toast-btn" id="toastBtn">前往首页</button>
    </div>
</div>

<script>
    (function() {
        const form = document.getElementById('installForm');
        const msg = document.getElementById('msg');
        const btn = document.getElementById('installBtn');

        const overlay = document.getElementById('toastOverlay');
        const toastTitle = document.getElementById('toastTitle');
        const toastDesc = document.getElementById('toastDesc');
        let toastBtn = document.getElementById('toastBtn');

        let submitting = false;

        function showToast(title, desc, btnText, redirectUrl) {
            toastTitle.textContent = title || '提示';
            toastDesc.textContent = desc || '';
            toastBtn.textContent = btnText || '确定';
            overlay.style.display = 'flex';

            // 移除旧监听，避免重复绑定
            const newBtn = toastBtn.cloneNode(true);
            toastBtn.parentNode.replaceChild(newBtn, toastBtn);
            toastBtn = newBtn;
            toastBtn.addEventListener('click', function() {
                if (redirectUrl) {
                    window.location.href = redirectUrl;
                } else {
                    overlay.style.display = 'none';
                }
            });

            overlay.onclick = function(e) {
                if (e.target === overlay) {
                    if (redirectUrl) {
                        window.location.href = redirectUrl;
                    } else {
                        overlay.style.display = 'none';
                    }
                }
            };
        }

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            if (submitting) return;

            const admin = form.querySelector('[name="admin"]').value.trim();
            const pwd = form.querySelector('[name="password"]').value.trim();

            msg.style.display = 'none';
            msg.textContent = '';

            if (!admin || admin.length < 2) {
                showMsg('账号至少2个字符');
                return;
            }
            if (!pwd || pwd.length < 6) {
                showMsg('密码至少6位');
                return;
            }

            submitting = true;
            btn.disabled = true;
            btn.textContent = '安装中...';

            const formData = new FormData(form);

            // 直接提交到同目录的 install.php（即当前文件）
            fetch('install.php', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                btn.disabled = false;
                btn.textContent = '安装';
                submitting = false;

                if (data && data.code === 200) {
                    const descText = data.msg ? `code: ${data.code}, msg: ${data.msg}` : '安装成功';
                    showToast('安装成功', descText, '前往首页', '/');
                } else {
                    const errMsg = data && data.msg ? data.msg : '安装失败，请检查配置';
                    showToast('安装失败', errMsg, '重试', null);
                    showMsg(errMsg);
                }
            })
            .catch(error => {
                btn.disabled = false;
                btn.textContent = '安装';
                submitting = false;
                showToast('请求错误', '网络异常或服务端无响应', '重试', null);
                showMsg('网络请求失败');
                console.error('Fetch error:', error);
            });
        });

        function showMsg(text) {
            msg.style.display = 'block';
            msg.textContent = text;
            msg.style.background = '#fff3e0';
            msg.style.color = '#b85c00';
            setTimeout(() => { msg.style.display = 'none'; }, 5000);
        }

        document.querySelectorAll('input').forEach(inp => {
            inp.addEventListener('input', () => {
                msg.style.display = 'none';
            });
        });
    })();
</script>
</body>
</html>
